name: Daily Resume Tailor

on:
  schedule:
    - cron: '0 9 * * *'   # 9 AM UTC daily
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max jobs to tailor (default: 50)'
        default: '50'
        required: false
      sources:
        description: 'Sources to run (all / intern_list / linkedin / handshake)'
        default: 'all'
        required: false

permissions:
  contents: write

jobs:
  tailor:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt playwright

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      # ── Discovery ─────────────────────────────────────────────────────────────
      # Each source runs independently with continue-on-error so one failure
      # never blocks the others.

      - name: Discover — intern-list.com
        if: ${{ github.event.inputs.sources == 'all' || github.event.inputs.sources == '' || github.event.inputs.sources == 'intern_list' }}
        env:
          GOOGLE_API_KEY:       ${{ secrets.GOOGLE_API_KEY }}
          TURSO_DATABASE_URL:   ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN:     ${{ secrets.TURSO_AUTH_TOKEN }}
        run: python main.py --source intern_list
        continue-on-error: true

      - name: Discover — LinkedIn
        if: ${{ github.event.inputs.sources == 'all' || github.event.inputs.sources == '' || github.event.inputs.sources == 'linkedin' }}
        env:
          GOOGLE_API_KEY:       ${{ secrets.GOOGLE_API_KEY }}
          LINKEDIN_EMAIL:       ${{ secrets.LINKEDIN_EMAIL }}
          LINKEDIN_PASSWORD:    ${{ secrets.LINKEDIN_PASSWORD }}
          TURSO_DATABASE_URL:   ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN:     ${{ secrets.TURSO_AUTH_TOKEN }}
        run: python main.py --source linkedin
        continue-on-error: true   # skips gracefully if secrets not set

      - name: Discover — Handshake
        if: ${{ github.event.inputs.sources == 'all' || github.event.inputs.sources == '' || github.event.inputs.sources == 'handshake' }}
        env:
          GOOGLE_API_KEY:       ${{ secrets.GOOGLE_API_KEY }}
          HANDSHAKE_EMAIL:      ${{ secrets.HANDSHAKE_EMAIL }}
          HANDSHAKE_PASSWORD:   ${{ secrets.HANDSHAKE_PASSWORD }}
          TURSO_DATABASE_URL:   ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN:     ${{ secrets.TURSO_AUTH_TOKEN }}
        run: python main.py --source handshake
        continue-on-error: true   # skips gracefully if secrets not set

      # ── Tailor ────────────────────────────────────────────────────────────────

      - name: Tailor resumes for top new jobs
        timeout-minutes: 25
        continue-on-error: true
        env:
          GOOGLE_API_KEY:       ${{ secrets.GOOGLE_API_KEY }}
          TURSO_DATABASE_URL:   ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN:     ${{ secrets.TURSO_AUTH_TOKEN }}
        run: |
          LIMIT=${{ github.event.inputs.limit || '50' }}
          python main.py --tailor --limit $LIMIT

      # ── Commit ────────────────────────────────────────────────────────────────
      # DB changes now go to Turso — only commit generated PDFs.

      - name: Commit generated PDFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/resumes/
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git pull --rebase origin master
            git commit -m "chore: daily tailor $(date -u +%Y-%m-%d)"
            git push
          fi
