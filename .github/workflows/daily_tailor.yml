name: Daily Resume Tailor

on:
  schedule:
    - cron: '0 9 * * *'   # 9 AM UTC daily
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max jobs to tailor (default: 50)'
        default: '50'
        required: false

permissions:
  contents: write

jobs:
  tailor:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt playwright

      - name: Install Playwright browsers (for intern-list scraper)
        run: playwright install chromium --with-deps

      - name: Discover new jobs (intern-list)
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python main.py --source intern_list
        continue-on-error: true   # don't abort tailor if discovery fails

      - name: Tailor resumes
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          LIMIT=${{ github.event.inputs.limit || '50' }}
          python main.py --tailor --limit $LIMIT

      - name: Commit updated tracker and generated PDFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tracker/applications.db output/resumes/
          git diff --staged --quiet && echo "Nothing to commit" || \
            git commit -m "chore: daily tailor $(date -u +%Y-%m-%d)" && git push
