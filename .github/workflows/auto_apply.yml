name: Auto Apply

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max jobs to apply to (default: 20)'
        default: '20'
        required: false

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt playwright

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run auto-apply (headless, approved jobs only)
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          LIMIT=${{ github.event.inputs.limit || '20' }}
          python main.py --apply --headless --limit $LIMIT

      - name: Commit updated tracker and screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tracker/applications.db output/apply_screenshots/ || true
          git diff --staged --quiet && echo "Nothing to commit" || \
            git commit -m "chore: auto-apply run $(date -u +%Y-%m-%d)" && git push
