name: Auto Apply

on:
  schedule:
    - cron: '0 14 * * 1-5'   # 10 AM ET (UTC-4) on weekdays
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max jobs to apply to (default: 20)'
        default: '20'
        required: false
      dry_run:
        description: 'Dry run — fill forms + screenshot, never submit'
        default: 'false'
        required: false

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt playwright

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run auto-apply (headless, approved jobs from Turso)
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN:   ${{ secrets.TURSO_AUTH_TOKEN }}
          GOOGLE_API_KEY:     ${{ secrets.GOOGLE_API_KEY }}
          LINKEDIN_EMAIL:     ${{ secrets.LINKEDIN_EMAIL }}
          LINKEDIN_PASSWORD:  ${{ secrets.LINKEDIN_PASSWORD }}
        run: |
          LIMIT=${{ github.event.inputs.limit || '20' }}
          DRY=${{ github.event.inputs.dry_run || 'false' }}
          if [ "$DRY" = "true" ]; then
            python main.py --apply --headless --dry-run --limit $LIMIT
          else
            python main.py --apply --headless --limit $LIMIT
          fi

      - name: Commit screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/apply_screenshots/ || true
          git diff --staged --quiet && echo "Nothing to commit" || \
            git commit -m "chore: auto-apply screenshots $(date -u +%Y-%m-%d)" && git push
