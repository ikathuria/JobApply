<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobApply — Redesign</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; overflow: hidden; }
    body { font-family: "DM Sans", sans-serif; }

    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(120,120,180,0.25); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(120,120,180,0.45); }

    /* Input/select resets */
    input, select, textarea, button { font-family: "DM Sans", sans-serif; }
    input[type="range"] { cursor: pointer; }
    input::placeholder, textarea::placeholder { color: #8888A0; }
    select option { background: #1A1A28; }

    /* Smooth transitions */
    * { transition: background-color 0.18s ease, border-color 0.18s ease, color 0.18s ease; }
    button, a { transition: opacity 0.12s ease, background 0.12s ease, box-shadow 0.12s ease, color 0.12s ease !important; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Data -->
  <script src="components/data.js"></script>

  <!-- UI Kit -->
  <script type="text/babel" src="components/ui-kit.jsx"></script>

  <!-- Sidebar -->
  <script type="text/babel" src="components/sidebar.jsx"></script>

  <!-- Jobs view -->
  <script type="text/babel" src="components/jobs-view.jsx"></script>

  <!-- Job drawer + confirm modal -->
  <script type="text/babel" src="components/job-drawer.jsx"></script>

  <!-- Analytics + Settings -->
  <script type="text/babel" src="components/analytics-settings.jsx"></script>

  <!-- App root -->
  <script type="text/babel" src="components/app.jsx"></script>
</body>
</html>
