search:
  keywords:
    - "artificial intelligence"
    - "machine learning"
    - "AI"
    - "ML"
    - "LLM"
    - "deep learning"
    - "NLP"
    - "generative AI"
    - "RAG"
    - "computer vision"
    - "data science"
  role_types:
    - "intern"
    - "internship"
  location: "USA"
  exclude_keywords:
    - "no visa"
    - "no sponsorship"
    - "citizens only"
    - "clearance required"
    - "security clearance"

scoring:
  weights:
    keyword_match: 0.4
    role_relevance: 0.3
    recency: 0.2
    sponsorship_friendly: 0.1
  min_score: 0.0   # keep all listings; score used only for sorting

sources:
  intern_list:
    url: "https://www.intern-list.com/?k=aiml"
    enabled: true
  linkedin:
    enabled: true
    search_query: "AI ML internship"
    easy_apply_only: true
    max_jobs: 60
  handshake:
    enabled: true
    queries:
      - "AI intern"
      - "machine learning intern"
      - "LLM intern"
      - "data science intern"
      - "NLP intern"
    max_jobs: 80

linkedin:
  email: ""      # fill in .env as LINKEDIN_EMAIL
  password: ""   # fill in .env as LINKEDIN_PASSWORD

handshake:
  email: ""      # fill in .env as HANDSHAKE_EMAIL
  password: ""   # fill in .env as HANDSHAKE_PASSWORD

llm:
  provider: "gemini"       # options: "gemini", "anthropic"
  gemini_model: "gemini-2.5-flash"
  anthropic_model: "claude-sonnet-4-6"

tracker:
  db_path: "tracker/applications.db"

output:
  resumes_dir: "output/resumes"
  logs_dir: "logs"
