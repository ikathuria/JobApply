# NOTE: this `search` block is descriptive only — the functional keyword lists,
# role gate, and exclusions live in src/pipeline/job_filter.py (STRONG/GOOD/
# ROLE/EXCLUDE/SENIORITY constants). Keep this in sync for humans reading config.
search:
  keywords:
    - "artificial intelligence"
    - "machine learning"
    - "AI"
    - "ML"
    - "LLM"
    - "deep learning"
    - "NLP"
    - "generative AI"
    - "RAG"
    - "computer vision"
    - "data science"
  # Primary target since 2026-07-19: full-time new-grad AI/ML roles (grad May 2027).
  # Internships / co-ops kept in scope for CPT during the school year.
  role_types:
    - "new grad"
    - "new graduate"
    - "entry level"
    - "early career"
    - "university graduate"
    - "full time"
    - "intern"
    - "internship"
    - "co-op"
  location: "USA"
  exclude_keywords:
    - "no visa"
    - "no sponsorship"
    - "citizens only"
    - "clearance required"
    - "security clearance"
  # Over-senior roles are soft-penalized (not excluded) in job_filter.py.
  deprioritize_seniority:
    - "senior"
    - "staff"
    - "principal"
    - "lead"
    - "manager"
    - "director"
    - "5+ years"

scoring:
  weights:
    keyword_match: 0.4
    role_relevance: 0.3
    recency: 0.2
    sponsorship_friendly: 0.1   # known H-1B sponsor (company history) OR JD visa keywords
  min_score: 0.0   # keep all listings; score used only for sorting

filters:
  # Soft by default: known H-1B sponsors (config/h1b_sponsors.json) get a scoring
  # boost, but unknown companies are NOT excluded (they may still sponsor).
  # Flip to true to hard-skip non-sponsor companies at scrape time (M17).
  require_known_sponsor: false

sources:
  intern_list:
    url: "https://www.intern-list.com/?k=aiml"
    enabled: true
  newgrad_jobs:
    url: "https://www.newgrad-jobs.com/?k=aiml"
    enabled: true
  # LinkedIn + Handshake PAUSED 2026-06-22 — fragile browser automation,
  # account-ban risk. Code + secrets retained; set enabled: true to re-enable.
  linkedin:
    enabled: false
    search_query: "AI ML internship"
    easy_apply_only: true
    max_jobs: 60
  handshake:
    enabled: false
    queries:
      - "intern"
      - "software intern"
      - "data intern"
      - "AI intern"
      - "machine learning intern"
    max_jobs: 80

linkedin:
  email: ""      # fill in .env as LINKEDIN_EMAIL
  password: ""   # fill in .env as LINKEDIN_PASSWORD

handshake:
  email: ""      # fill in .env as HANDSHAKE_EMAIL
  password: ""   # fill in .env as HANDSHAKE_PASSWORD

llm:
  provider: "groq"         # options: "groq", "gemini", "anthropic"
  groq_model: "llama-3.1-8b-instant"
  gemini_model: "gemini-2.5-flash"
  anthropic_model: "claude-sonnet-4-6"

tracker:
  db_path: "tracker/applications.db"

output:
  resumes_dir: "output/resumes"
  logs_dir: "logs"
