services:
  - type: web
    name: jobapply
    runtime: python
    region: ohio        # us-east-2 — closest to Purdue / West Lafayette
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      cd web && npm ci && npm run build
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/stats

    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: DB_PATH
        value: /tmp/applications.db   # local replica for embedded-replica mode
      - key: OUTPUT_DIR
        value: /tmp/resumes
      - key: TURSO_DATABASE_URL
        sync: false          # e.g. libsql://jobapply.turso.io — set in Render dashboard
      - key: TURSO_AUTH_TOKEN
        sync: false          # from Turso dashboard → your db → Generate token
      - key: GOOGLE_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: LINKEDIN_EMAIL
        sync: false
      - key: LINKEDIN_PASSWORD
        sync: false
